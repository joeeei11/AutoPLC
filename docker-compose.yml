services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OPENPLC_URL: http://openplc:8080
      CORS_ORIGINS: http://localhost,http://localhost:5173
    depends_on:
      - openplc
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  openplc:
    image: openplc/openplc_v3:linux
    ports:
      - "8080:8080"
    restart: unless-stopped
